<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XC_机构 | Guild de Streaming</title>
<style>
    * {
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
        background:#f2f3f5;
        color:#333;
    }
    .container {
        max-width:600px;
        margin:0 auto;
        padding:0 16px;
    }
    header {
        background:#fff;
        padding:12px 0;
        box-shadow:0 1px 2px rgba(0,0,0,0.05);
        position:sticky;
        top:0;
        z-index:90;
    }
    .header-content {
        display:flex;
        justify-content:space-between;
        align-items:center;
    }
    .logo {
        display:flex;
        align-items:center;
        gap:8px;
    }
    .logo img {
        width:32px;
        height:32px;
        border-radius:6px;
        object-fit:cover;
    }
    .logo-text {
        font-size:17px;
        font-weight:700;
        color:#111;
    }
    .btn-primary {
        background:linear-gradient(90deg, #fe2c55, #ff5a60);
        color:#fff;
        border:none;
        padding:12px 26px;
        border-radius:30px;
        font-size:16px;
        font-weight:600;
        cursor:pointer;
        box-shadow:0 4px 10px rgba(254,44,85,0.2);
    }
    .hero {
        background:linear-gradient(135deg, #111 0%, #222 100%);
        color:#fff;
        padding:50px 0;
        text-align:center;
    }
    .hero h1 {
        font-size:24px;
        margin-bottom:12px;
    }
    .hero p {
        font-size:15px;
        opacity:0.85;
        margin-bottom:22px;
    }
    .modal {
        display:none;
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.6);
        z-index:100;
        justify-content:center;
        align-items:center;
    }
    .modal-box {
        background:#fff;
        width:90%;
        max-width:380px;
        border-radius:20px;
        padding:24px;
        position:relative;
    }
    .modal-close {
        position:absolute;
        top:16px;
        right:18px;
        font-size:22px;
        color:#666;
        background:none;
        border:none;
        cursor:pointer;
    }
    .modal-title {
        text-align:center;
        font-size:18px;
        font-weight:600;
        margin-bottom:24px;
    }
    .avatar-grid {
        display:grid;
        grid-template-columns:repeat(4, 1fr);
        gap:16px 12px;
    }
    .avatar-item {
        text-align:center;
    }
    .avatar-item a {
        display:inline-block;
    }
    .avatar-item img {
        width:60px;
        height:60px;
        border-radius:50%;
        object-fit:cover;
        border:2px solid #fe2c55;
    }
    .avatar-name {
        margin-top:6px;
        font-size:12px;
        color:#333;
        font-weight:500;
    }
    .section {
        padding:40px 0;
        text-align:center;
    }
    footer {
        background:#111;
        color:#fff;
        padding:20px 0;
        text-align:center;
        font-size:12px;
    }
</style>
</head>
<body>

<header>
    <div class="container">
        <div class="header-content">
            <div class="logo">
                <img src="logo.png" alt="Logo">
                <div class="logo-text">XC_机构</div>
            </div>
        </div>
    </div>
</header>

<section class="hero">
    <div class="container">
        <h1>Únete a Nuestra Guild</h1>
        <p>Conviértete en streamer y crece con nosotros en Latinoamérica.</p>
        <button class="btn-primary" onclick="openModal()">Solicitar Ahora</button>
    </div>
</section>

<section class="section">
    <div class="container">
        <button class="btn-primary" onclick="openModal()">Solicitar Ahora</button>
    </div>
</section>

<div class="modal" id="modal">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal()">×</button>
        <div class="modal-title">Contacta con nosotros</div>
        <div class="avatar-grid">
            <div class="avatar-item">
                <a href="https://sitio1.com" target="_blank">
                    <img src="https://picsum.photos/id/101/100" alt="Avatar">
                </a>
                <div class="avatar-name">Luis</div>
            </div>
            <div class="avatar-item">
                <a href="https://sitio2.com" target="_blank">
                    <img src="https://picsum.photos/id/102/100" alt="Avatar">
                </a>
                <div class="avatar-name">Ana</div>
            </div>
            <div class="avatar-item">
                <a href="https://sitio3.com" target="_blank">
                    <img src="https://picsum.photos/id/103/100" alt="Avatar">
                </a>
                <div class="avatar-name">Carlos</div>
            </div>
            <div class="avatar-item">
                <a href="https://sitio4.com" target="_blank">
                    <img src="https://picsum.photos/id/104/100" alt="Avatar">
                </a>
                <div class="avatar-name">Sofia</div>
            </div>
            <div class="avatar-item">
                <a href="https://sitio5.com" target="_blank">
                    <img src="https://picsum.photos/id/105/100" alt="Avatar">
                </a>
                <div class="avatar-name">Diego</div>
            </div>
            <div class="avatar-item">
                <a href="https://sitio6.com" target="_blank">
                    <img src="https://picsum.photos/id/106/100" alt="Avatar">
                </a>
                <div class="avatar-name">Valeria</div>
            </div>
            <div class="avatar-item">
                <a href="https://sitio7.com" target="_blank">
                    <img src="https://picsum.photos/id/107/100" alt="Avatar">
                </a>
                <div class="avatar-name">Javier</div>
            </div>
            <div class="avatar-item">
                <a href="https://sitio8.com" target="_blank">
                    <img src="https://picsum.photos/id/108/100" alt="Avatar">
                </a>
                <div class="avatar-name">Camila</div>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="container">© 2026 XC_机构. Todos los derechos reservados.</div>
</footer>

<script>
    function openModal() {
        document.getElementById('modal').style.display = 'flex';
    }
    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }
    window.onclick = function(e) {
        const modal = document.getElementById('modal');
        if (e.target === modal) modal.style.display = 'none';
    }
</script>

</body>
</html>
