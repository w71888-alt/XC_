<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XC_ Agency</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">

  <!-- NAVBAR -->
  <header class="flex justify-between items-center px-8 py-5 bg-black/80 backdrop-blur">
    <div class="flex items-center gap-4">
      <img src="logo.png" class="h-16 object-contain" />
      <span class="text-2xl font-bold">XC_ Agency</span>
    </div>
    <button onclick="openModal()" class="bg-white text-black px-6 py-2 rounded-xl">
      Aplicar
    </button>
  </header>

  <!-- HERO -->
  <section class="h-[85vh] flex flex-col justify-center items-center text-center px-6">
    <h1 class="text-5xl md:text-7xl font-bold mb-6">
      Gana Dinero con TikTok LIVE
    </h1>
    <p class="text-gray-300 mb-8 max-w-xl">
      Únete a nuestra agencia y empieza a generar ingresos reales.
    </p>
    <button onclick="openModal()" class="bg-white text-black px-8 py-4 rounded-2xl">
      Aplicar Ahora
    </button>
  </section>

  <!-- MODAL -->
  <div id="modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center">
    <div class="bg-gray-900 p-8 rounded-2xl max-w-3xl w-full">
      <h2 class="text-2xl font-bold mb-6 text-center">Selecciona un asesor</h2>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
        <!-- 8 AVATARS -->
        <div onclick="goLink('https://www.tiktok.com/t/ZSkWxbWDQ/')" class="text-center cursor-pointer">
          <img src="https://i.pravatar.cc/100?img=1" class="mx-auto rounded-full mb-2" />
          <p>User1</p>
        </div>
        <div onclick="goLink('https://www.tiktok.com/t/ZSkWxbWDQ/')" class="text-center cursor-pointer">
          <img src="https://i.pravatar.cc/100?img=2" class="mx-auto rounded-full mb-2" />
          <p>User2</p>
        </div>
        <div onclick="goLink('https://www.tiktok.com/t/ZSkWxbWDQ/')" class="text-center cursor-pointer">
          <img src="https://i.pravatar.cc/100?img=3" class="mx-auto rounded-full mb-2" />
          <p>User3</p>
        </div>
        <div onclick="goLink('https://www.tiktok.com/t/ZSkWxbWDQ/')" class="text-center cursor-pointer">
          <img src="https://i.pravatar.cc/100?img=4" class="mx-auto rounded-full mb-2" />
          <p>User4</p>
        </div>
        <div onclick="goLink('https://www.tiktok.com/t/ZSkWxbWDQ/')" class="text-center cursor-pointer">
          <img src="https://i.pravatar.cc/100?img=5" class="mx-auto rounded-full mb-2" />
          <p>User5</p>
        </div>
        <div onclick="goLink('https://www.tiktok.com/t/ZSkWxbWDQ/')" class="text-center cursor-pointer">
          <img src="https://i.pravatar.cc/100?img=6" class="mx-auto rounded-full mb-2" />
          <p>User6</p>
        </div>
        <div onclick="goLink('https://www.tiktok.com/t/ZSkWxbWDQ/')" class="text-center cursor-pointer">
          <img src="https://i.pravatar.cc/100?img=7" class="mx-auto rounded-full mb-2" />
          <p>User7</p>
        </div>
        <div onclick="goLink('https://www.tiktok.com/t/ZSkWxbWDQ/')" class="text-center cursor-pointer">
          <img src="https://i.pravatar.cc/100?img=8" class="mx-auto rounded-full mb-2" />
          <p>User8</p>
        </div>
      </div>

      <div class="text-center mt-6">
        <button onclick="closeModal()" class="text-gray-400">Cerrar</button>
      </div>
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function goLink(url) {
      window.open(url, '_blank');
    }
  </script>

</body>
</html>
